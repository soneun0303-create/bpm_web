<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>회원가입 — BPM Routine</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="auth.css" />
</head>
<body>

<div class="auth-card">
  <a class="brand" href="index.html">
    <span class="mark">♥</span> BPM&nbsp;Routine
  </a>

  <h1>회원가입</h1>
  <p class="sub">계정을 만들고 나만의 심박수 루틴을 시작하세요.</p>

  <div id="msg" class="msg"></div>

  <form id="signupForm" novalidate>
    <div class="field">
      <label for="name">이름</label>
      <input type="text" id="name" autocomplete="name"
             placeholder="홍길동" required />
    </div>
    <div class="field">
      <label for="email">이메일</label>
      <input type="email" id="email" autocomplete="email"
             placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label for="pw">비밀번호</label>
      <input type="password" id="pw" autocomplete="new-password"
             placeholder="6자 이상" required />
    </div>
    <div class="field">
      <label for="pw2">비밀번호 확인</label>
      <input type="password" id="pw2" autocomplete="new-password"
             placeholder="비밀번호 다시 입력" required />
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">회원가입</button>
  </form>

  <p class="alt">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
  <a class="back-home" href="index.html">← 홈으로 돌아가기</a>
</div>

<script type="module">
  import { auth, authErrorMessage } from "./firebase-config.js";
  import {
    createUserWithEmailAndPassword,
    updateProfile,
    onAuthStateChanged,
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const form = document.getElementById("signupForm");
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  onAuthStateChanged(auth, (user) => {
    if (user) window.location.replace("index.html");
  });

  function showError(text) {
    msg.className = "msg error";
    msg.textContent = text;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pw = document.getElementById("pw").value;
    const pw2 = document.getElementById("pw2").value;

    if (!name) { showError("이름을 입력하세요."); return; }
    if (!email) { showError("이메일을 입력하세요."); return; }
    if (pw.length < 6) { showError("비밀번호는 6자 이상이어야 합니다."); return; }
    if (pw !== pw2) { showError("비밀번호가 일치하지 않습니다."); return; }

    btn.disabled = true;
    btn.textContent = "가입 중…";
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
      msg.className = "msg ok";
      msg.textContent = "가입 완료! 이동 중…";
      window.location.replace("index.html");
    } catch (err) {
      showError(authErrorMessage(err.code));
      btn.disabled = false;
      btn.textContent = "회원가입";
    }
  });
</script>

</body>
</html>
